<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Answer Questions</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e2749; /* Dark blue background */
      color: #fff; /* White font color */
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background-color: transparent; /* Same as background */
    }
    h1 {
      text-align: center;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      color: #ffffff;
    }
    .question {
      margin-bottom: 30px;
    }
    .question label {
      font-weight: bold;
      font-size: 18px;
    }
    .question textarea {
      width: 100%;
      height: 100px;
      resize: vertical;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 16px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      color: #000; /* Black font color for inputs */
    }
    #finishButton {
      background-color: #4e8de6; /* Light blue color */
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
      display: block;
      margin: 0 auto;
    }
    #finishButton:hover {
      background-color: #3666b8; /* Darker blue color on hover */
    }
  </style>
</head>
<body>
  <h1>Questions</h1>
  <div class="container">
    <form id="questionForm" action="/ques" method="POST" autocomplete="off">
      <div class="question">
        <label for="question1">Question 1: Define a Primary Key?</label>
        <textarea id="question1" name="answer1" placeholder="Enter your answer for Question...">{{ answers['answer1'] }}</textarea>
      </div>
      <div class="question">
        <label for="question2">Question 2: What is Normalization?</label>
        <textarea id="question2" name="answer2" placeholder="Enter your answer for Question...">{{ answers['answer2'] }}</textarea>
      </div>
      <div class="question">
        <label for="question3">Question 3: What are constraints in DBMS?</label>
        <textarea id="question3" name="answer3" placeholder="Enter your answer for Question...">{{ answers['answer3'] }}</textarea>
      </div>
      <div class="question">
        <label for="question4">Question 4: Explain generalization in DBMS.</label>
        <textarea id="question4" name="answer4" placeholder="Enter your answer for Question...">{{ answers['answer4'] }}</textarea>
      </div>
      <div class="question">
        <label for="question5">Question 5: What is Specialisation?</label>
        <textarea id="question5" name="answer5" placeholder="Enter your answer for Question...">{{ answers['answer5'] }}</textarea>
      </div>
      <div class="question">
        <label for="question6">Question 6: What are triggers in DBMS?</label>
        <textarea id="question6" name="answer6" placeholder="Enter your answer for Question...">{{ answers['answer6'] }}</textarea>
      </div>
      <div class="question">
        <label for="question7">Question 7: Brief about Structured Query Language</label>
        <textarea id="question7" name="answer7" placeholder="Enter your answer for Question...">{{ answers['answer7'] }}</textarea>
      </div>
      <div class="question">
        <label for="question8">Question 8: Explain the Entity-Relationship Model.</label>
        <textarea id="question8" name="answer8" placeholder="Enter your answer for Question...">{{ answers['answer8'] }}</textarea>
      </div>
      <div class="question">
        <label for="question9">Question 9: Write about the concepts: Indexing and Hashing in DBMS context.</label>
        <textarea id="question9" name="answer9" placeholder="Enter your answer for Question...">{{ answers['answer9'] }}</textarea>
      </div>
      <div class="question">
        <label for="question10">Question 10: Explain briefly about data warehousing.</label>
        <textarea id="question10" name="answer10" placeholder="Enter your answer for Question...">{{ answers['answer10'] }}</textarea>
      </div>
      <button id="finishButton" type="submit">Finish</button>
    </form>
  </div>
</body>
</html>
