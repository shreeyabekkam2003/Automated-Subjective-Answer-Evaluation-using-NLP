<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e2749; /* Dark blue background */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
        text-align: center;
        position: fixed;
        top: 20px; /* Adjust as needed */
        left: 50%;
        transform: translateX(-50%);
        z-index: 999; /* Ensure the heading is above other elements */
        width: 100%;
        background-color: rgba(30, 39, 73, 0.9); /* Semi-transparent dark blue background */
        padding: 10px 0;
        margin-bottom: 20px;
    }
    .result-container {
        margin-top: 100px; /* Adjust based on the height of the heading */
    }
        .result-info {
            text-align: center;
            margin-top: 100px;
        }
        .show-button {
            background-color: #23a403; /* Green color */
            color: white;
            padding: 15px 30px; /* Increased button size */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin-bottom: 20px; /* Added margin bottom */
        }
        .show-button:hover {
            background-color: #17c200; /* Darker green color on hover */
        }
        .show-detail-button {
            background-color: #3498db; /* Light blue color */
            color: white;
            padding: 15px 30px; /* Increased button size */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
            position: center; /* Added margin bottom */
        }
        .show-detail-button:hover {
            background-color: #2980b9; /* Darker blue color on hover */
        }
        .detailed-results {
            display: none;
            overflow-x: auto;
            text-align: center; /* Hide detailed results by default */
        }
        .detailed-results table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .detailed-results th,
        .detailed-results td {
            padding: 10px;
            border: 1px solid #ffffff; /* White border */
            text-align: left;
        }
        .detailed-results th {
            background-color: #3498db; /* Light blue color */
            color: white;
        }
        .detailed-results td {
            background-color: #2c3e50; /* Dark blue color */
            color: white;
        }

        /* Additional styles for bold and bigger font */
        .result-info p {
            font-weight: bold; /* Make the text bold */
            font-size: 20px; /* Increase font size */
        }
    </style>
</head>
<body>
    <h1>Results</h1>
    <form method="POST" action="{{ url_for('results') }}">
        {% if show_results %}
        <div class="result-info" id="resultInfo">
            <p class="total-score">Total Score: <span style="font-weight: bold; font-size: 20px;">{{ total_score }}</span></p>
            <p class="final-grade">Final Grade: <span style="font-weight: bold; font-size: 20px;">{{ final_grade }}</span></p>
            <button type="button" class="show-detail-button" id="showDetailButton">Show Detailed Results</button>
        </div>
        {% endif %}

        <!-- Detailed results section -->
        {% if show_results %}
        <div class="detailed-results" id="detailedResults">
            <h2>Detailed Results</h2>
            <table>
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for question, score in detailed_results %}
                    <tr>
                        <td>{{ question }}</td>
                        <td>{{ score }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}

        <!-- "Show Results" button -->
        {% if not show_results %}
        <button type="submit" class="show-button" id="showButton">Show Results</button>
        {% endif %}
    </form>

    <!-- JavaScript to handle button clicks -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var showResults = {{ show_results|tojson }};
            if (showResults) {
                document.getElementById("resultInfo").style.display = "block";
                document.getElementById("showButton").style.display = "none";
            }
        });

        document.getElementById("showDetailButton").onclick = function() {
            // Show detailed results section
            document.getElementById("detailedResults").style.display = "block";
        };
    </script>
</body>
</html>
